# docker-compose.prod.yml — production
# Usage : docker compose -f docker-compose.prod.yml up -d
version: '3.9'

services:
  server:
    image: ghcr.io/${GITHUB_USERNAME}/tontitrack-server:latest

    restart: always

    expose:
    - "5000"

    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}

      MONGODB_URI: ${MONGODB_URI}

      CLIENT_URL: ${CLIENT_URL}

      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}

      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES}

      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS}

      API_RATE_LIMIT: ${API_RATE_LIMIT}
      AUTH_RATE_LIMIT: ${AUTH_RATE_LIMIT}

  client:
    image: ghcr.io/${GITHUB_USERNAME}/tontitrack-client:latest
    container_name: tontitrack-client-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - tontitrack-network

volumes:
  mongo-data-prod:

networks:
  tontitrack-network:
    driver: bridge
