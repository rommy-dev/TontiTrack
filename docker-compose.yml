version: '3.9'

services:

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev

    container_name: tontitrack-server
    restart: unless-stopped

    ports:
      - "5000:5000"

    volumes:
      - ./server/src:/app/src
      - ./server/uploads:/app/uploads

    env_file:
      - ./server/.env

    environment:
      NODE_ENV: development
      PORT: 5000

    networks:
      - tontitrack-network


  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: runner
      args:
        VITE_API_URL: ${VITE_API_URL}

    container_name: tontitrack-client
    restart: unless-stopped

    ports:
      - "3000:80"

    depends_on:
      - server

    networks:
      - tontitrack-network


networks:
  tontitrack-network:
    driver: bridge